name: ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install deps
        run: pip install -e ".[dev]"

      - name: ruff
        run: ruff check src/ tests/

      - name: pytest
        run: pytest --timeout=30 -q

      - name: build
        run: python -m build

      - name: twine check
        run: twine check dist/*
